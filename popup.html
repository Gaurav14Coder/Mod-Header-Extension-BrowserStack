<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 240px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .header {
      background: #16213e;
      padding: 12px 14px;
      border-bottom: 1px solid #0f3460;
    }
    .header-title { font-weight: 700; font-size: 13px; color: #f26522; }
    .header-subtitle { font-size: 11px; color: #888; margin-top: 2px; }
    .content { padding: 14px; }
    .status-label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 1px; color: #888; margin-bottom: 6px;
    }
    .status-active { color: #4ade80; font-weight: 700; font-size: 13px; }
    .status-inactive { color: #f87171; font-weight: 700; font-size: 13px; }
    .header-value {
      font-size: 13px; color: #fff; font-family: monospace;
      font-weight: 700; background: #0f172a;
      padding: 8px; border-radius: 6px;
      margin-top: 8px; word-break: break-all;
      display: none;
    }
    .btn-clear {
      width: 100%; padding: 10px; margin-top: 14px;
      background: #dc2626; color: white; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .btn-clear:disabled { background: #333; color: #666; cursor: not-allowed; }
    .manual-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #0f3460;
    }
    .manual-label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 1px; color: #888; margin-bottom: 6px;
    }
    .manual-input {
      width: 100%; padding: 10px;
      background: #0f172a; color: #fff; border: 1px solid #0f3460;
      border-radius: 6px; font-size: 13px; font-family: monospace;
      outline: none;
    }
    .manual-input:focus { border-color: #f26522; }
    .divider {
      display: flex; align-items: center; margin: 14px 0;
      color: #888; font-size: 11px;
    }
    .divider::before, .divider::after {
      content: ""; flex: 1; height: 1px; background: #0f3460;
    }
    .divider span { padding: 0 8px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">Header</div>
    <div class="header-subtitle">Mod header injection</div>
  </div>
  <div class="content">
    <div class="status-label">Current Status</div>
    <div id="status-text" class="status-inactive">⭕ Mod_Header_Inactive</div>
    <div class="header-value" id="header-value"></div>
    <button class="btn-clear" id="btn-clear" disabled>Clear Active Header</button>
    <div class="divider"><span>OR</span></div>
    <div class="manual-section">
      <div class="manual-label">Enter Header Value</div>
      <input type="text" class="manual-input" id="manual-input" placeholder="Enter header value & press Enter...">
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
